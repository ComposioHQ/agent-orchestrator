# Agent Orchestrator — self-hosting config (dog-fooding)

worktreeDir: ~/.worktrees/ao

defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: [desktop]

projects:
  ao:
    name: Agent Orchestrator
    repo: ComposioHQ/agent-orchestrator
    path: ~/Desktop/agent-orchestrator
    defaultBranch: main
    sessionPrefix: ao
    scm:
      plugin: github
    tracker:
      plugin: github
    symlinks: [.claude]
    postCreate:
      - "pnpm install"
      - "pnpm build --filter @composio/ao-core --filter @composio/ao-cli --filter '@composio/ao-plugin-*'"
    agentConfig:
      permissions: skip
